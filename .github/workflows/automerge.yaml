name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'jutonz/homepage'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Auto-merge allowed dependencies
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          # dependency|allowed-types (pipe-delimited)
          POLICIES="
          @graphql-codegen/client-preset|semver-minor semver-patch
          @graphql-codegen/cli|semver-minor semver-patch
          @types/node|semver-minor semver-patch
          autoprefixer|semver-minor semver-patch
          caniuse-lite|semver-patch
          cssnano|semver-minor semver-patch
          prettier|semver-minor semver-patch
          react-router-dom|semver-minor semver-patch
          urql|semver-minor semver-patch
          "

          UPDATE_TYPE="${UPDATE_TYPE#version-update:}"
          matched=false
          while IFS='|' read -r dep allowed; do
            dep="$(echo "$dep" | xargs)"
            [ -z "$dep" ] && continue
            if echo "$DEP_NAMES" | grep -q "$dep" && \
               echo "$allowed" | grep -q "$UPDATE_TYPE"; then
              echo "Auto-merging: $dep ($UPDATE_TYPE)"
              gh pr merge --auto --squash "$PR_URL"
              matched=true
              break
            fi
          done <<< "$POLICIES"

          if [ "$matched" = false ]; then
            echo "No matching policy, skipping auto-merge"
          fi
