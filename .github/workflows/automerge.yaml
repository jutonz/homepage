name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'jutonz/homepage'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Auto-merge allowed dependencies
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          # dependency|allowed-types (pipe-delimited)
          POLICIES="
          @graphql-codegen/client-preset|semver-minor semver-patch
          @graphql-codegen/cli|semver-minor semver-patch
          @hookform/resolvers|semver-minor semver-patch
          @playwright/test|semver-minor semver-patch
          @types/node|semver-minor semver-patch
          @types/react|semver-minor semver-patch
          absinthe|semver-minor semver-patch
          autoprefixer|semver-minor semver-patch
          caniuse-lite|semver-patch
          cssnano|semver-minor semver-patch
          date-fns|semver-minor semver-patch
          dialyxir|semver-minor semver-patch
          ecto_sql|semver-minor semver-patch
          esbuild|semver-patch
          finch|semver-minor semver-patch
          floki|semver-minor semver-patch
          graphql|semver-minor semver-patch
          httpoison|semver-minor semver-patch
          money|semver-minor semver-patch
          phoenix_ecto|semver-minor semver-patch
          phoenix_html|semver-minor semver-patch
          phoenix_live_reload|semver-minor semver-patch
          postcss|semver-minor semver-patch
          postgrex|semver-minor semver-patch
          prettier|semver-minor semver-patch
          react-hook-form|semver-minor semver-patch
          react-router-dom|semver-minor semver-patch
          redix|semver-minor semver-patch
          req|semver-minor semver-patch
          sentry|semver-minor semver-patch
          tailwindcss|semver-minor semver-patch
          three|semver-minor semver-patch
          typescript|semver-minor semver-patch
          urql|semver-minor semver-patch
          wallaby|semver-minor semver-patch
          "

          UPDATE_TYPE="${UPDATE_TYPE#version-update:}"
          matched=false
          while IFS='|' read -r dep allowed; do
            dep="$(echo "$dep" | xargs)"
            [ -z "$dep" ] && continue
            if echo "$DEP_NAMES" | grep -q "$dep" && \
               echo "$allowed" | grep -q "$UPDATE_TYPE"; then
              echo "Auto-merging: $dep ($UPDATE_TYPE)"
              gh pr merge --auto --squash "$PR_URL"
              matched=true
              break
            fi
          done <<< "$POLICIES"

          if [ "$matched" = false ]; then
            echo "No matching policy, skipping auto-merge"
          fi
